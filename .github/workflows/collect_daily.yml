name: Daily Data Collection

on:
  schedule:
    # 9am UTC weekdays. Note: at this time COMEX has not yet closed for the day,
    # so Barchart will return the previous session's closing price, which is the
    # correct EOD value. Polymarket runs 24/7 so its price is always current.
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed to push the updated CSVs back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run data collector
        env:
          BARCHART_API_KEY: ${{ secrets.BARCHART_API_KEY }}
        run: python collect_daily.py

      - name: Commit and push new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_options.csv daily_polymarket.csv
          # Only commit if the index actually changed
          if git diff --cached --quiet; then
            echo "No new data collected today -- nothing to commit."
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "data: daily collect ${TODAY}"
            git push
          fi
